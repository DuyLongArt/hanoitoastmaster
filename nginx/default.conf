server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    types {
        text/css css;
        application/javascript js;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Extensionless asset files saved from the original site
    location = /www/css {
        default_type text/css;
    }

    location = /www/js {
        default_type application/javascript;
    }

    location ~ ^/www/js\([0-9]+\)$ {
        default_type application/javascript;
    }

    # Static assets must not fall back to index.html
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|eot|ico|mp4|mov|html)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
