server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Long cache for hashed assets generated by Vite (e.g. assets/index-abc123.js)
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: unknown URLs return index.html so React Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
